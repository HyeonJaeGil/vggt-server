services:
  recon-serve:
    build:
      context: .
      dockerfile: ${DOCKERFILE_PATH:-docker/Dockerfile.vggt}
      args:
        COMMON_BASE_IMAGE: ${RECON_COMMON_IMAGE:-recon-serve-common:latest}
    image: ${SERVICE_IMAGE:-recon-serve:vggt}
    restart: unless-stopped
    environment:
      RECON_SERVE_HOST: 0.0.0.0
      RECON_SERVE_PORT: ${SERVICE_PORT:-8000}
      RECON_SERVE_BACKEND: ${RECON_BACKEND:-vggt}
      RECON_SERVE_DATA_ROOT: /app/data/runs
      RECON_SERVE_MAX_IMAGES: ${RECON_SERVE_MAX_IMAGES:-32}
      RECON_SERVE_VGGT_MODEL_ID: ${RECON_SERVE_VGGT_MODEL_ID:-facebook/VGGT-1B}
      RECON_SERVE_VGGT_DEFAULT_DEPTH_CONF_THRESHOLD: ${RECON_SERVE_VGGT_DEFAULT_DEPTH_CONF_THRESHOLD:-1.0}
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    ports:
      - "${SERVICE_PORT:-8000}:${SERVICE_PORT:-8000}"
    volumes:
      - ./data:/app/data
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${SERVICE_PORT:-8000}/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  huggingface-cache:
